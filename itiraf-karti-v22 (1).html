function runLoader(){
  const bar = document.getElementById('load-bar');
  const ls  = document.getElementById('loading-screen');
  let p = 0;
  
  function finish(){
    bar.style.width='100%';
    ls.classList.add('fade-out');
    setTimeout(()=>{ ls.style.display='none'; }, 500);
  }

  /* Progress bar animasyonu */
  const iv = setInterval(()=>{
    p += Math.random() * 9 + 5;
    if(p >= 100){ p = 100; clearInterval(iv); }
    bar.style.width = p + '%';
  }, 55);

  /* Maksimum 1.5s — internet olmasa da çalışır */
  setTimeout(finish, 1500);
}

/* ══════════════════════════════════════════════════════
   KATEGORİ GİRİŞ ANİMASYONU v10
   
   FAZA 1 (0-1.4s): #intro-screen — büyük emojiler + kategori yazısı
   FAZA 2 (1.4s+):  #intro-screen solar, #stack-overlay açılır
                    10 kart birbirini takip ederek masaya iner (2s)
                    GSAP stacking mantığı: her yeni kart gelirken
                    alttakiler küçülür (scale dip efekti)
   FAZA 3 (3.4s+):  En üst kart öne fırlar → stack solar → oyun
══════════════════════════════════════════════════════ */
function playIntro(m, onDone){
/*
  SİNEMATİK GİRİŞ v18 — CSS efektleri + sıfır kasma
  0.0s  Grid reveal kapak acilir
  0.3s  Isik huzme suyurur
  0.5s  Glitch + LOGO SLAM
  1.5s  Kategori
  2.6s  Kart fani
  3.8s  Kapanıs
*/
  const meta = CAT_META[m];
  const card = activeCard;
  const cc   = card.thumbGrad[2] || card.decoStroke1;

  const intro   = document.getElementById('game-intro');
  const cover   = document.getElementById('gi-cover');
  const bgEl    = document.getElementById('gi-bg');
  const scan    = document.getElementById('gi-scan');
  const flash   = document.getElementById('gi-flash');
  const ring    = document.getElementById('gi-ring');
  const beam    = document.getElementById('gi-beam');
  const gridDiv = document.getElementById('gi-grid-reveal');
  const letEl   = document.getElementById('gi-letters');
  const karEl   = document.getElementById('gi-kartlari');
  const shimmer = document.getElementById('gi-shimmer');
  const glR     = document.getElementById('gi-glitch-r');
  const glB     = document.getElementById('gi-glitch-b');
  const catDiv  = document.getElementById('gi-cat');
  const giIcon  = document.getElementById('gi-icon');
  const giName  = document.getElementById('gi-name');
  const giLine  = document.getElementById('gi-line');
  const giCSub  = document.getElementById('gi-csub');
  const fanDiv  = document.getElementById('gi-fan');

  function flash1(cls='pop'){ flash.className=''; void flash.offsetWidth; flash.className=cls; }
  function after(ms,fn){ return setTimeout(fn,ms); }

  /* ── RESET ── */
  intro.style.setProperty('--cc', cc);
  intro.classList.add('active');
  beam.style.setProperty('--cc', cc);

  /* Cover gizlenir - grid reveal zaten kapagi yapar */
  cover.style.cssText='opacity:0;transition:none;pointer-events:none;';
  bgEl.style.opacity='0'; bgEl.style.transition='none';
  scan.className=''; shimmer.className='';
  beam.className=''; ring.className=''; ring.style.cssText='';
  glR.className='gi-glitch-r'; glB.className='gi-glitch-b';
  letEl.innerHTML=''; karEl.style.cssText='opacity:0;transform:scaleX(0.2);';
  catDiv.style.cssText='opacity:0;';
  giIcon.className='gi-cat-icon'; giName.className='gi-cat-name';
  giLine.className='gi-cat-line'; giCSub.className='gi-cat-sub';
  fanDiv.innerHTML=''; fanDiv.style.cssText='opacity:1;';

  giIcon.textContent=meta.icon; giName.textContent=meta.label;
  giCSub.textContent=(meta.subLabel||'').toUpperCase();

  /* ── Grid hücreleri oluştur ── */
  gridDiv.innerHTML='';
  const COLS=6, ROWS=8, cells=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const el=document.createElement('div'); el.className='gi-cell'; gridDiv.appendChild(el); cells.push(el);
  }

  /* ── Partiküller — CSS animasyonu ── */
  const pCont=document.createElement('div');
  pCont.style.cssText='position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:5;';
  intro.appendChild(pCont);
  const W=window.innerWidth, H=window.innerHeight;
  for(let i=0;i<24;i++){
    const p=document.createElement('div');
    p.className='gi-particle';
    const sz=3+Math.random()*8;
    const x=10+Math.random()*80, y=20+Math.random()*70;
    const dy=(-(40+Math.random()*160))+'px';
    const dx=((Math.random()-.5)*120)+'px';
    const dur=2.5+Math.random()*2, del=Math.random()*3;
    const pop=(0.3+Math.random()*0.5).toFixed(2);
    p.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${x}%;top:${y}%;
      background:${cc};
      --dy:${dy};--dx:${dx};--ds:${0.3+Math.random()*0.7};--pop:${pop};
      animation:particleFloat ${dur}s ease-in-out ${del}s infinite;
      filter:blur(${Math.random()*2}px);
      opacity:0;
    `;
    // Bazi parcaciklar beyaz
    if(i%4===0) p.style.background='rgba(255,255,255,0.8)';
    pCont.appendChild(p);
  }

  /* ── Kart canvas ── */
  const cv=document.createElement('canvas'); cv.width=CW; cv.height=CH;
  const c2=cv.getContext('2d');
  const g=c2.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,card.thumbGrad[0]); g.addColorStop(1,card.thumbGrad[1]);
  c2.fillStyle=g; c2.beginPath(); c2.roundRect(0,0,CW,CH,16); c2.fill();
  const sg=c2.createLinearGradient(0,0,CW,0);
  sg.addColorStop(0,card.thumbGrad[2]||card.decoStroke1);
  sg.addColorStop(1,card.decoStroke1);
  c2.fillStyle=sg; c2.fillRect(0,0,CW,5);
  drawDecoLayer(c2,card);
  c2.save(); c2.font='900 58px "Cinzel Decorative",serif';
  c2.textAlign='center'; c2.textBaseline='middle';
  c2.fillStyle=card.decoStroke1; c2.globalAlpha=0.18; c2.fillText('?',CW/2,CH/2+4); c2.restore();
  const cardURL=cv.toDataURL();

  /* ══ FAZ 0 — Grid kapak açılır (0→0.6s) ══ */
  bgEl.style.background=`radial-gradient(ellipse 110% 95% at 50% 50%, ${cc}20 0%, ${cc}06 60%, transparent 80%)`;

  // Hücreleri rastgele sırada aç
  const order=[...Array(cells.length).keys()].sort(()=>Math.random()-.5);
  order.forEach((idx,i)=>{
    after(i*18, ()=>{
      cells[idx].style.setProperty('--cd','0s');
      cells[idx].classList.add('open');
    });
  });

  after(80, ()=>{ bgEl.style.transition='opacity 1.2s ease'; bgEl.style.opacity='1'; });
  after(220, ()=>{ scan.classList.add('show'); });
  after(300, ()=>{ beam.classList.add('sweep'); });

  /* ══ FAZ 1 — LOGO SLAM (0.5→1.4s) ══ */
  const word='İTİRAF';
  [...word].forEach((ch,i)=>{
    const s=document.createElement('span'); s.className='gi-letter'; s.textContent=ch;
    s.style.textShadow=`0 0 12px ${cc}, 0 0 28px color-mix(in srgb,${cc} 55%,transparent)`;
    letEl.appendChild(s);
    after(480+i*68,()=>{ s.classList.add('slam'); });
  });

  // Son harf inmeden once glitch
  after(460, ()=>{
    glR.classList.add('active'); glB.classList.add('active');
  });

  after(480+word.length*68+280, ()=>{
    flash1('pop');
    karEl.style.transition='opacity 0.5s ease, transform 0.5s cubic-bezier(.22,1,.36,1)';
    karEl.style.opacity='1'; karEl.style.transform='scaleX(1)';
    after(180,()=>{ shimmer.classList.add('show'); });
  });

  /* ══ FAZ 2 — KATEGORİ (1.5→2.6s) ══ */
  after(1500, ()=>{
    letEl.style.transition='opacity 0.3s ease, transform 0.35s ease';
    letEl.style.opacity='0'; letEl.style.transform='translateY(-14px) scale(0.87)';
    karEl.style.transition='opacity 0.25s ease'; karEl.style.opacity='0';
    shimmer.style.transition='opacity 0.25s ease'; shimmer.style.opacity='0';
    scan.style.transition='opacity 0.4s ease'; scan.classList.remove('show');
    beam.className='';

    // Halka
    ring.style.cssText=`
      position:absolute;top:52%;left:50%;
      width:240px;height:240px;border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      opacity:1;pointer-events:none;z-index:7;
      background:radial-gradient(circle,${cc}44 0%,${cc}16 50%,transparent 72%);
      filter:blur(4px);
      transition:transform 0.5s cubic-bezier(.2,.85,.3,1), opacity 0.5s ease 0.15s;
    `;
    after(10,()=>{ ring.style.transform='translate(-50%,-50%) scale(3)'; ring.style.opacity='0'; });
    flash1('pop2');
    catDiv.style.opacity='1';
  });

  after(1540, ()=>{ giIcon.classList.add('show'); });
  after(1900, ()=>{ giName.classList.add('show'); });
  after(2080, ()=>{ giLine.classList.add('show'); });
  after(2220, ()=>{ giCSub.classList.add('show'); after(500,()=>{ giIcon.classList.add('pulse'); }); });

  /* ══ FAZ 3 — KART FANI (2.6→3.8s) ══ */
  after(2620, ()=>{
    catDiv.style.transition='opacity 0.33s ease, transform 0.33s ease';
    catDiv.style.opacity='0'; catDiv.style.transform='scale(1.05)';

    const angles=[-24,-15,-7,0,7,15,24];
    const offs=[-60,-38,-18,0,18,38,60];
    const N=7;

    for(let i=0;i<N;i++){
      const fc=document.createElement('div'); fc.className='gi-fc';
      const fromY=-370, fromR=angles[i]*1.5;
      fc.style.setProperty('--from',`translate(${offs[i]}px,${fromY}px) rotate(${fromR}deg)`);
      fc.style.setProperty('--mid', `translate(${offs[i]}px,8px)   rotate(${angles[i]*0.4}deg)`);
      fc.style.setProperty('--to',  `translate(${offs[i]}px,0px)   rotate(${angles[i]}deg)`);
      fc.style.backgroundImage=`url(${cardURL})`;
      fc.style.backgroundSize='cover';
      fc.style.border=`1.5px solid ${card.frontBorder}`;
      fc.style.animationDelay=`${i*82}ms`;
      fc.style.animationDuration='0.46s';
      fc.style.animationFillMode='forwards';
      fc.style.animationTimingFunction='cubic-bezier(.22,1.2,.36,1)';
      fc.style.animationName='cardDrop';
      fanDiv.appendChild(fc);
    }

    after(N*82+460, ()=>{
      const mid=fanDiv.children[3]; if(!mid) return;
      mid.classList.add('star');
      mid.style.transition='transform 0.55s cubic-bezier(.34,1.5,.64,1), filter 0.55s ease';
      mid.style.transform='translate(0px,-44px) rotate(0deg) scale(1.22)';
      mid.style.filter=`drop-shadow(0 30px 60px rgba(0,0,0,0.9)) drop-shadow(0 0 38px ${cc}88)`;
      mid.style.zIndex='20';
      flash1('pop2');
      [...fanDiv.children].forEach((fc,i)=>{
        if(i===3) return;
        after(i*30,()=>{ fc.style.transition='opacity 0.4s ease'; fc.style.opacity='0'; });
      });
    });
  });

  /* ══ FAZ 4 — KAPANIŞ (3.8→4.4s) ══ */
  after(3800, ()=>{
    flash1('pop');
    fanDiv.style.transition='opacity 0.32s ease'; fanDiv.style.opacity='0';
    after(140,()=>{ cover.style.transition='opacity 0.5s ease'; cover.style.opacity='1'; });
    after(640,()=>{
      intro.classList.remove('active');
      letEl.style.cssText=''; letEl.innerHTML='';
      karEl.style.cssText='opacity:0;transform:scaleX(0.2);';
      catDiv.style.cssText='opacity:0;'; catDiv.style.transform='';
      giIcon.style.cssText=''; giIcon.className='gi-cat-icon';
      giLine.style.cssText='width:0;transition:none;';
      fanDiv.innerHTML=''; fanDiv.style.cssText='opacity:1;';
      ring.style.cssText=''; scan.classList.remove('show');
      beam.className=''; shimmer.className='';
      glR.className='gi-glitch-r'; glB.className='gi-glitch-b';
      gridDiv.innerHTML='';
      if(pCont.parentNode) pCont.parentNode.removeChild(pCont);
      cover.style.cssText='opacity:1;transition:none;';
      document.getElementById('velvet-table').classList.add('show');
      document.getElementById('velvet-light').classList.add('show');
      onDone();
    });
  });
}

function buildSettings(){
  const tr=document.getElementById('theme-row');
  THEMES.forEach(t=>{
    const sw=document.createElement('div');
    sw.className='t-swatch'+(t.id===activeTheme.id?' active':'');
    sw.innerHTML=`<div class="t-circle" style="background:${t.swatchGrad};border-color:${t.swatchBorder};"></div><div class="t-name">${t.name}</div>`;
    sw.onclick=()=>applyTheme(t);
    tr.appendChild(sw);
  });
  const cr=document.getElementById('card-row');
  CARDS.forEach(card=>{
    const ct=document.createElement('div');
    ct.className='c-thumb'+(card.id===activeCard.id?' active':'');
    const mini=document.createElement('div');mini.className='c-mini';
    const canvas=document.createElement('canvas');canvas.width=38;canvas.height=54;
    canvas.style.cssText='width:38px;height:54px;display:block;';
    drawThumb(canvas.getContext('2d'),card);
    mini.appendChild(canvas);
    ct.appendChild(mini);
    ct.innerHTML+=`<div class="c-name">${card.name}</div>`;
    ct.querySelector('.c-mini').innerHTML='';
    ct.querySelector('.c-mini').appendChild(canvas);
    ct.onclick=()=>applyCard(card);
    cr.appendChild(ct);
  });
}

function applyTheme(t){
  document.body.className=t.cls;
  activeTheme=t;
  document.querySelectorAll('.t-swatch').forEach((s,i)=>s.classList.toggle('active',THEMES[i].id===t.id));
}
function applyCard(card){
  activeCard=card;
  document.querySelectorAll('.c-thumb').forEach((s,i)=>s.classList.toggle('active',CARDS[i].id===card.id));
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(m){
  mode=m;
  shuffled=shuffle(Qs[m]);
  cidx=0;prevQuestion=null;
  document.getElementById('backdrop').classList.remove('open');
  menuEl.classList.add('gone');

  // Giriş animasyonu
  playIntro(m, ()=>{
    backEl.classList.add('show');
    prevBtnEl.classList.add('show');
    prevBtnEl.disabled=true;
    counterEl.style.display='flex';
    totEl.textContent=shuffled.length;
    updateCounter();
    createCard(cidx);
  });
}

function returnToMenu(){
  clearTimeout(autoT);stopProg();
  if(activeOv){activeOv.remove();activeOv=null;}
  gameArea.innerHTML='';
  /* Animasyonları yeniden oynat — gone kaldırılmadan önce öğeleri sıfırla */
  const title=menuEl.querySelector('.menu-title');
  const rule=menuEl.querySelector('.menu-rule');
  const sub=menuEl.querySelector('.menu-sub');
  const btns=menuEl.querySelectorAll('.menu-btn');
  [title,rule,sub,...btns].forEach(el=>{
    if(!el)return;
    el.style.animation='none';
    el.style.opacity='0';
  });
  menuEl.classList.remove('gone');
  /* Bir frame sonra animasyonları yeniden tetikle */
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(title){title.style.animation='';title.style.opacity='';}
    if(rule){rule.style.animation='';rule.style.opacity='';}
    if(sub){sub.style.animation='';sub.style.opacity='';}
    btns.forEach(b=>{b.style.animation='';b.style.opacity='';});
  }));
  backEl.classList.remove('show');
  prevBtnEl.classList.remove('show');
  counterEl.style.display='none';
  hintEl.style.opacity='1';
  mode=null;animating=false;prevQuestion=null;
  dragShadow.classList.remove('visible');
}

function updateCounter(){curEl.textContent=cidx+1;}

/* Ghost canvas veri URL'si oluştur */
function buildGhostDataURL(card){
  const cv = document.createElement('canvas');
  cv.width = CW; cv.height = CH;
  const ctx = cv.getContext('2d');
  /* Gradient arka plan */
  const grd = ctx.createLinearGradient(0,0,0,CH);
  grd.addColorStop(0,card.thumbGrad[0]);
  grd.addColorStop(1,card.thumbGrad[1]);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.roundRect(0,0,CW,CH,18); ctx.fill();
  /* Üst şerit */
  const sg = ctx.createLinearGradient(0,0,CW,0);
  sg.addColorStop(0,card.thumbGrad[2]||card.decoStroke1);
  sg.addColorStop(1,card.decoStroke1);
  ctx.fillStyle = sg; ctx.fillRect(0,0,CW,5);
  /* Deko katmanı (clearRect YOK) */
  drawDecoLayer(ctx, card);
  /* Soru işareti — kartın kendi rengiyle */
  ctx.save();
  ctx.font = 'bold 82px var(--display-font,serif)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle = card.decoStroke1;
  ctx.globalAlpha = 0.18;
  ctx.fillText('?', CW/2, CH/2+4);
  ctx.restore();
  return cv.toDataURL();
}

/* ══════════════════════════════════════════════
   KART OLUŞTUR
══════════════════════════════════════════════ */
function createCard(idx){
  if(idx >= shuffled.length){showGameOver();return;}
  const {q,e} = shuffled[idx];
  const card = activeCard;

  gameArea.innerHTML = '';
  ghostEls = [];

  // Eski drag dinleyicilerini temizle
  if(dragAbort){ dragAbort.abort(); dragAbort=null; }

  const container = document.createElement('div');
  container.className = 'card-container';

  const scene = document.createElement('div');
  scene.className = 'card-scene';
  sceneEl = scene;

  // Perspektif gölgesi
  const shadow = document.createElement('div');
  shadow.className = 'deck-shadow';
  scene.appendChild(shadow);

  // Ghost img paylaşılan canvas
  ghostImgData = buildGhostDataURL(card);

  // ghost2 (en arka)
  const g2 = document.createElement('div');
  g2.className = 'ghost-layer2';
  const img2 = document.createElement('img');
  img2.src = ghostImgData;
  img2.style.cssText='width:168px;height:240px;border-radius:18px;display:block;';
  g2.appendChild(img2);
  scene.appendChild(g2);

  // ghost1 (ön)
  const g1 = document.createElement('div');
  g1.className = 'ghost-layer';
  const img1 = document.createElement('img');
  img1.src = ghostImgData;
  img1.style.cssText='width:168px;height:240px;border-radius:18px;display:block;';
  g1.appendChild(img1);
  scene.appendChild(g1);

  ghostEls = [g2, g1]; // [arka, ön]

  // Gerçek kart
  const wrap = document.createElement('div');
  wrap.className = 'card-wrapper floating';
  const inner = document.createElement('div'); inner.className='card-inner';
  const front = buildCardFace(card);
  const back  = document.createElement('div'); back.className='card-face card-back card-back-face';
  back.style.background=card.frontBg; back.style.border=`1.5px solid ${card.frontBorder}`;
  const bd=document.createElement('canvas'); bd.style.cssText='position:absolute;inset:0;width:100%;height:100%;opacity:0.5;';
  bd.width=CW; bd.height=CH; drawDeco(bd.getContext('2d'),card); back.appendChild(bd);
  inner.appendChild(front); inner.appendChild(back);
  wrap.appendChild(inner);
  scene.appendChild(wrap);
  activeWrap = wrap;

  attachDrag(wrap, q, e);

  const numLabel = document.createElement('div');
  numLabel.className = 'card-num-label';
  numLabel.textContent = `${idx+1}  /  ${shuffled.length}`;

  container.appendChild(scene);
  container.appendChild(numLabel);
  gameArea.appendChild(container);
}
function buildCardFace(card){
  /* ─ Hologram maskesi: MASK_FN çizer, Q oval alanını keser ─ */
  const mc=document.createElement('canvas');
  mc.width=CW; mc.height=CH;
  const mctx=mc.getContext('2d');
  MASK_FN[card.id](mctx);
  /* Soru işaretinin geleceği merkez oval — hologram buraya gelmesin */
  mctx.save();
  mctx.globalCompositeOperation='destination-out';
  mctx.beginPath();
  mctx.ellipse(CW/2, CH/2-6, 58, 66, 0, 0, Math.PI*2);
  mctx.fill();
  mctx.restore();
  const mu=mc.toDataURL();

  const front=document.createElement('div');
  front.className='card-face card-front';
  front.style.background=card.frontBg;
  front.style.border=`1.5px solid ${card.frontBorder}`;
  /* Hafif iç parlaklık */
  front.style.boxShadow=`inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.2)`;

  /* Deste ghost kartları (oyun ekranında) */
  for(let g=0;g<2;g++){
    const ghost=document.createElement('div');
    ghost.className='card-deck-ghost';
    ghost.style.background=card.frontBg;
    ghost.style.borderColor=card.frontBorder;
    front.appendChild(ghost);
  }

  /* Hologram katmanı — tam spektrum rainbow, kart rengine göre hue tonu */
  const holo=document.createElement('div');
  holo.className='card-holo';
  holo.style.setProperty('--card-hue', card.cardHue||'0deg');
  /* Mask ile desen uygulanır */
  holo.style.webkitMaskImage=`url(${mu})`;
  holo.style.maskImage=`url(${mu})`;
  front.appendChild(holo);

  /* Glitter sparkle katmanı */
  const glitter=document.createElement('div');
  glitter.className='card-glitter';
  glitter.style.webkitMaskImage=`url(${mu})`;
  glitter.style.maskImage=`url(${mu})`;
  front.appendChild(glitter);

  /* Shine overlay */
  const shine=document.createElement('div');
  shine.className='card-shine';
  front.appendChild(shine);

  /* Deco canvas (çerçeve + eskitme) */
  const dg=document.createElement('div'); dg.className='deco-group';
  const dc=document.createElement('canvas'); dc.className='card-deco';
  dc.width=CW; dc.height=CH;
  drawDeco(dc.getContext('2d'),card);
  dg.appendChild(dc);
  front.appendChild(dg);

  /* ─────────────────────────────────────────────────────────
   * Soru İşareti — TEK ADET, hologram efektli
   *
   * .cq-wrap → absolute, kartın merkezinde
   * .cq-base → kartın decoQ renginde, %28 opak zemin
   * .cq-shine → kartın hologram renklerinden background-clip:text gradient
   *             background-position mouse hareketiyle güncellenir (setHoloVars)
   *
   * Hologram maskesi bu alanı dışarıda bıraktığı için:
   * → Desen soru işaretinin üzerine GELMEZ
   * → Soru işareti kendi hologram efektiyle PARLAR
   * ───────────────────────────────────────────────────────── */
  const qWrap=document.createElement('div');
  qWrap.className='cq-wrap';

  const qBase=document.createElement('div');
  qBase.className='cq-base';
  qBase.textContent='?';
  qBase.style.color=card.decoStroke1;

  const qShine=document.createElement('div');
  qShine.className='cq-shine';
  qShine.textContent='?';

  const qSparkle=document.createElement('div');
  qSparkle.className='cq-sparkle';
  qSparkle.textContent='?';

  qWrap.appendChild(qBase);
  qWrap.appendChild(qShine);
  qWrap.appendChild(qSparkle);
  front.appendChild(qWrap);

  /* Alt etiket kaldırıldı */

  return front;
}

/* ══════════════════════════════════════════════
   SÜRÜKLEME — event leak fix, AbortController
══════════════════════════════════════════════ */
let dragAbort = null; // global abort controller for drag listeners

function attachDrag(wrap,q,e){
  // Eski drag listener'ları temizle
  if(dragAbort){ dragAbort.abort(); dragAbort=null; }
  dragAbort = new AbortController();
  const sig = dragAbort.signal;

  let sx,sy,cx=0,cy=0,drag=false;
  const T=55;

  wrap.addEventListener('mousemove',ev=>{
    if(drag||wrap.classList.contains('is-flipped'))return;
    wrap.classList.remove('floating');setHoloVars(wrap,ev.clientX,ev.clientY);
  },{signal:sig});
  wrap.addEventListener('mouseleave',()=>{
    if(drag)return;resetHoloVars(wrap);
    if(!wrap.classList.contains('is-flipped'))wrap.classList.add('floating');
  },{signal:sig});

  const dn=ev=>{
    if(animating)return;drag=true;
    wrap.classList.add('is-dragging');wrap.classList.remove('floating');
    const t=ev.touches?ev.touches[0]:ev;sx=t.clientX;sy=t.clientY;
    hintEl.style.opacity='0';
    dragShadow.classList.add('visible');
  };
  const mv=ev=>{
    if(!drag)return;ev.preventDefault();
    const t=ev.touches?ev.touches[0]:ev;
    cx=t.clientX-sx;cy=t.clientY-sy;
    const d=Math.sqrt(cx*cx+cy*cy),nd=Math.min(d/200,1);
    const rot=(cx/200)*10;
    const bx=(cy/200)*20,by=-(cx/200)*20;
    wrap.style.transform=`translate(${cx}px,${cy}px) rotate(${rot}deg)`;
    wrap.style.setProperty('--bend-x',by+'deg');wrap.style.setProperty('--bend-y',bx+'deg');
    wrap.style.setProperty('--sx',1+(Math.abs(cx)/200)*.03);wrap.style.setProperty('--sy',1+(Math.abs(cy)/200)*.03);
    const o=Math.min(.9,nd*.85+.25);
    wrap.style.setProperty('--mx',(50+(cx/200)*12)+'%');wrap.style.setProperty('--my',(50+(cy/200)*12)+'%');
    wrap.style.setProperty('--posx',(50-(cx/200)*90)+'%');wrap.style.setProperty('--posy',(50-(cy/200)*150)+'%');
    wrap.style.setProperty('--o',o);
    const b=wrap.getBoundingClientRect();
    const shadowOffset=18+nd*20;
    dragShadow.style.cssText=`left:${b.left}px;top:${b.top+shadowOffset}px;width:${b.width}px;height:${b.height}px;opacity:${0.4+nd*0.3};transform:rotate(${rot}deg) scaleX(${0.88+nd*0.04}) scaleY(0.25);filter:blur(${8+nd*8}px);border-radius:18px;background:rgba(0,0,0,0.6);`;
  };
  const up=()=>{
    if(!drag)return;drag=false;
    wrap.classList.remove('is-dragging');
    dragShadow.classList.remove('visible');
    dragShadow.style.cssText='';
    const d=Math.sqrt(cx*cx+cy*cy);
    if(d>T){
      dir=Math.abs(cx)>Math.abs(cy)?(cx>0?'right':'left'):(cy>0?'bottom':'top');
      flipCard(wrap,q,e);
    } else {
      wrap.style.transition='transform .55s cubic-bezier(.34,1.8,.64,1)';
      wrap.style.transform='translate(0,0)';
      wrap.style.setProperty('--bend-x','0deg');wrap.style.setProperty('--bend-y','0deg');
      wrap.style.setProperty('--sx','1');wrap.style.setProperty('--sy','1');
      setTimeout(()=>{wrap.style.transition='';resetHoloVars(wrap);wrap.classList.add('floating');},550);
    }
  };

  wrap.addEventListener('mousedown',dn,{signal:sig});
  wrap.addEventListener('touchstart',dn,{passive:false,signal:sig});
  window.addEventListener('mousemove',mv,{signal:sig});
  window.addEventListener('touchmove',mv,{passive:false,signal:sig});
  window.addEventListener('mouseup',up,{signal:sig});
  window.addEventListener('touchend',up,{signal:sig});
}

/* ══════════════════════════════════════════════
   FLIP + OVERLAY — kart tasarımına uyumlu
══════════════════════════════════════════════ */
/* ══════════════════════════════════════════════
   FLIP + OVERLAY — kesin düzeltme
   - animating flag tüm akışı bloke eder
   - overlay tekrar açılamaz (isClosing guard)
   - resetCard: inline style sıfırlaması, animation temizliği
══════════════════════════════════════════════ */
let isClosingOv = false; // overlay kapanış guard

function flipCard(wrap,q,e){
  if(animating) return;
  animating = true;
  isClosingOv = false;

  wrap.style.transition = 'transform .18s ease';
  wrap.style.transform  = 'translate(0,0)';
  wrap.style.setProperty('--bend-x','0deg');
  wrap.style.setProperty('--bend-y','0deg');
  wrap.style.setProperty('--sx','1');
  wrap.style.setProperty('--sy','1');
  wrap.classList.remove('floating');
  wrap.classList.add('dir-'+dir,'shake');
  setTimeout(()=>wrap.classList.remove('shake'),400);

  setTimeout(()=>{
    wrap.style.transition = '';
    wrap.style.transform  = '';
    wrap.classList.add('is-flipped');
    setTimeout(()=>showOverlay(wrap,q,e), 620);
  }, 80);
}

function showOverlay(wrap,q,e){
  // Eğer zaten bir overlay varsa temizle
  if(activeOv){ activeOv.remove(); activeOv=null; }

  const card = activeCard;
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.style.background = `linear-gradient(150deg,${card.thumbGrad[0]} 0%,${card.thumbGrad[1]} 55%,${card.thumbGrad[0]} 100%)`;

  ov.innerHTML = `
    <div class="overlay-holo-panel" style="background-image:${card.holoLayers[0]};opacity:0.04;filter:${card.holoFilter};"></div>
    <div class="overlay-stripe"></div>
    <div class="ov-orn tl">❧</div><div class="ov-orn tr">❧</div>
    <div class="ov-orn bl">❧</div><div class="ov-orn br">❧</div>
    <div class="ov-card-deco"  style="background:${card.frontBg};border-color:${card.frontBorder};"></div>
    <div class="ov-card-deco2" style="background:${card.frontBg};border-color:${card.frontBorder};"></div>
    <div class="ov-body">
      <div class="ov-badge" style="color:${card.thumbGrad[2]};border-color:${card.frontBorder};">${MODE_LABELS[mode]}</div>
      <div class="ov-emoji">${e}</div>
      <div class="ov-line" style="background:linear-gradient(90deg,${card.thumbGrad[2]},${card.decoStroke1});"></div>
      <p class="magic-text" id="mtp" style="color:rgba(255,255,255,0.96);"></p>
      <div class="ov-line" style="background:linear-gradient(90deg,${card.thumbGrad[2]},${card.decoStroke1});"></div>
      <div class="ov-num"  style="color:rgba(255,255,255,0.45)">${cidx+1} / ${shuffled.length}</div>
      <div class="ov-hint" style="color:rgba(255,255,255,0.35)">Ekrana dokun · devam et</div>
    </div>`;

  document.body.appendChild(ov);
  activeOv = ov;

  requestAnimationFrame(()=>{
    ov.classList.add(DIR_IN[dir]);
    setTimeout(()=>{
      const p = ov.querySelector('#mtp');
      if(p) magicReveal(p,q,card);
    }, 300);
  });

  startProg();
  autoT = setTimeout(()=>doCloseOv(ov,wrap), DUR);

  // TEK click listener, once:true
  ov.addEventListener('click', ()=>{
    clearTimeout(autoT);
    stopProg();
    doCloseOv(ov,wrap);
  }, {once:true});
}

function doCloseOv(ov, wrap){
  if(isClosingOv) return;  // çift kapanmayı engelle
  isClosingOv = true;
  clearTimeout(autoT);
  stopProg();

  prevQuestion = {q:shuffled[cidx].q, e:shuffled[cidx].e, idx:cidx};
  prevBtnEl.disabled = false;

  ov.classList.remove(DIR_IN[dir]);
  ov.classList.add(DIR_OUT[dir]);

  setTimeout(()=>{
    ov.remove();
    activeOv = null;
    resetCard(wrap);
  }, 400);
}

function magicReveal(el,txt,card){
  el.innerHTML=''; let d=0;
  [...txt].forEach(ch=>{
    if(ch===' '){ el.appendChild(document.createTextNode(' ')); return; }
    const s=document.createElement('span');
    s.className='mc'; s.textContent=ch;
    s.style.animationDelay=d+'ms';
    if(card) s.style.setProperty('--accent-color',card.thumbGrad[2]);
    el.appendChild(s); d+=26;
  });
}

/* ══════════════════════════════════════════════
   DESTE GEÇİŞİ — kesin düzeltme
   
   Sekans (ms):
   0    → flip geri döner (CSS transition)
   420  → kart sağa kayar (card-retiring anim başlar)
          ghost-layer → öne çıkar (ghost-activating)
          ghost-layer2 → ghost-layer pozisyonuna (ghost-shifting)
   980  → cidx++, animasyonlar temizlenir
          wrap inline style/class sıfırlanır
          yeni drag bağlanır
          animating=false
══════════════════════════════════════════════ */
function resetCard(wrap){
  isClosingOv = false;

  // 1) Flip class'larını kaldır — kart düz dönüş yapar
  wrap.classList.remove('is-flipped','dir-right','dir-left','dir-top','dir-bottom');
  wrap.classList.remove('floating','is-dragging');
  // card-inner'ın transition'ını geçici koru (flip geri dönüşü)
  const inner = wrap.querySelector('.card-inner');
  if(inner) inner.style.transition = 'transform 0.6s cubic-bezier(.4,0,.2,1)';

  // 2) Flip geri dönüşü tamamlansın, sonra geçiş animasyonu
  setTimeout(()=>{
    if(inner) inner.style.transition = '';

    // Drag listener'ları temizle
    if(dragAbort){ dragAbort.abort(); dragAbort=null; }

    // Mevcut animasyonları temizle (önceki kalıntı)
    wrap.style.animation = 'none';
    wrap.style.cssText = 'position:absolute;left:0;top:0;z-index:3;';

    // Retire animasyonu
    wrap.style.animation = 'cardRetireRight 0.52s cubic-bezier(.4,0,.2,1) forwards';

    // Ghost'lar öne kayar
    if(ghostEls[1]){
      ghostEls[1].style.animation = 'ghostToActive 0.65s cubic-bezier(.22,1,.36,1) 0.15s forwards';
      ghostEls[1].style.zIndex = '9';
    }
    if(ghostEls[0]){
      ghostEls[0].style.animation = 'ghostShiftForward 0.5s cubic-bezier(.22,1,.36,1) 0.2s forwards';
    }

    // Geçiş tamamlandıktan sonra
    setTimeout(()=>{
      cidx++;
      updateCounter();

      if(cidx >= shuffled.length){
        if(sceneEl && sceneEl.parentElement) sceneEl.parentElement.remove();
        showGameOver();
        animating = false;
        return;
      }

      // Tüm animasyonları ve inline style'ları temizle
      wrap.style.cssText = '';
      wrap.style.animation = '';
      wrap.className = 'card-wrapper floating';

      if(ghostEls[1]){
        ghostEls[1].style.animation = '';
        ghostEls[1].style.zIndex = '';
        // Ghost 1'i CSS'teki statik pozisyonuna döndür
        ghostEls[1].style.transform = '';
        ghostEls[1].style.opacity  = '';
        ghostEls[1].style.filter   = '';
      }
      if(ghostEls[0]){
        ghostEls[0].style.animation = '';
        ghostEls[0].style.transform = '';
        ghostEls[0].style.opacity  = '';
        ghostEls[0].style.filter   = '';
      }

      // Yeni soruya drag bağla
      const {q,e} = shuffled[cidx];
      attachDrag(wrap,q,e);

      // Sayaç
      const nl = gameArea.querySelector('.card-num-label');
      if(nl) nl.textContent = `${cidx+1}  /  ${shuffled.length}`;

      animating = false;
    }, 600);

  }, 420);
}

function startProg(){
  const t0=Date.now();
  progEl.style.background = `linear-gradient(90deg,${activeCard.thumbGrad[2]},${activeCard.decoStroke1})`;
  progT=setInterval(()=>{progEl.style.width=Math.min(((Date.now()-t0)/DUR)*100,100)+'%';},100);
}
function stopProg(){clearInterval(progT);progEl.style.width='0%';}

function setHoloVars(w,mx,my){
  const b=w.getBoundingClientRect();
  const dx=(mx-(b.left+b.width/2))/(b.width*.55),dy=(my-(b.top+b.height/2))/(b.height*.55);
  const px=((mx-b.left)/b.width)*100,py=((my-b.top)/b.height)*100;
  const o=Math.min(1,Math.sqrt(dx*dx+dy*dy)*.85+.2);
  w.style.setProperty('--mx',px+'%');w.style.setProperty('--my',py+'%');
  w.style.setProperty('--posx',(px*1.8)+'%');w.style.setProperty('--posy',(py*3.2)+'%');
  w.style.setProperty('--o',o);
  /* cq-shine background-position güncelle — hologram soru işareti parlar */
  const qs=w.querySelector('.cq-shine');
  if(qs){
    qs.style.backgroundPosition=`${px*2.2}% ${py*2.2}%`;
    qs.style.animationDuration='1.1s';
  }
}
function resetHoloVars(w){
  w.style.setProperty('--o','0');
  w.style.setProperty('--posx','50%');
  w.style.setProperty('--posy','50%');
  const qs=w.querySelector('.cq-shine');
  if(qs){qs.style.backgroundPosition='';qs.style.animationDuration='';}
}

function showGameOver(){

/* ──────────────────────────────────────────
   KART KARIŞTIRMA ANİMASYONU
   3 kart sahneye fırlar, fan → flip → yığılır
   ~2.5s sonra callback
────────────────────────────────────────── */
function startShuffleAnimation(onDone){
  const overlay  = document.getElementById('shuffle-overlay');
  const cardsDiv = document.getElementById('shuffle-cards');
  const titleEl  = document.getElementById('shuffle-title');
  const readyEl  = document.getElementById('shuffle-ready');
  const card     = activeCard;
  const cc       = card.thumbGrad[2]||card.decoStroke1;

  /* Kart görseli */
  const cv=document.createElement('canvas'); cv.width=CW; cv.height=CH;
  const c2=cv.getContext('2d');
  const g=c2.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,card.thumbGrad[0]); g.addColorStop(1,card.thumbGrad[1]);
  c2.fillStyle=g; c2.beginPath(); c2.roundRect(0,0,CW,CH,16); c2.fill();
  drawDecoLayer(c2,card);
  c2.save(); c2.font='900 55px "Cinzel Decorative",serif';
  c2.textAlign='center'; c2.textBaseline='middle';
  c2.fillStyle=card.decoStroke1; c2.globalAlpha=0.18; c2.fillText('?',CW/2,CH/2+4); c2.restore();
  const cardURL=cv.toDataURL();

  /* Reset */
  cardsDiv.innerHTML='';
  titleEl.style.cssText='opacity:0;transform:translateY(8px);transition:none;';
  readyEl.style.cssText='opacity:0;transform:translateY(8px);transition:none;';
  overlay.classList.add('active');

  /* Kart elementleri */
  const N=7;
  const cards=[];
  for(let i=0;i<N;i++){
    const c=document.createElement('div'); c.className='s-card';
    c.style.backgroundImage=`url(${cardURL})`;
    c.style.backgroundSize='cover';
    c.style.border=`1.5px solid ${card.frontBorder}`;
    c.style.transform=`translate(-50%,-50%) translateY(-300px) rotate(${(Math.random()-.5)*60}deg) scale(0.5)`;
    c.style.opacity='0';
    c.style.zIndex=String(i+1);
    cardsDiv.appendChild(c); cards.push(c);
  }

  /* Başlık */
  setTimeout(()=>{
    titleEl.style.transition='opacity .4s ease, transform .4s ease';
    titleEl.style.opacity='1'; titleEl.style.transform='translateY(0)';
  },100);

  /* Kartlar peş peşe düşer */
  cards.forEach((c,i)=>{
    setTimeout(()=>{
      c.style.transition='transform .42s cubic-bezier(.22,1.25,.36,1), opacity .18s ease';
      c.style.opacity='0.92';
      const angle=(i-3)*10;
      const ox=(i-3)*22;
      c.style.transform=`translate(calc(-50% + ${ox}px),-50%) rotate(${angle}deg) scale(1)`;
    }, 200+i*80);
  });

  /* Karıştırma hareketi — kartlar yelpaze olup yeniden yığılır */
  setTimeout(()=>{
    cards.forEach((c,i)=>{
      const delay=i*60;
      setTimeout(()=>{
        c.style.transition=`transform .35s cubic-bezier(.4,0,.2,1) ${delay}ms`;
        const angle=(Math.random()-.5)*40;
        const ox=(Math.random()-.5)*60;
        const oy=(Math.random()-.5)*30;
        c.style.transform=`translate(calc(-50% + ${ox}px),calc(-50% + ${oy}px)) rotate(${angle}deg) scale(1.05)`;
      },0);
    });
  }, 200+N*80+150);

  /* İkinci karıştırma */
  setTimeout(()=>{
    cards.forEach((c,i)=>{
      setTimeout(()=>{
        c.style.transition='transform .3s cubic-bezier(.4,0,.2,1)';
        const angle=(Math.random()-.5)*50;
        const ox=(Math.random()-.5)*70;
        c.style.transform=`translate(calc(-50% + ${ox}px),-50%) rotate(${angle}deg) scale(1)`;
      }, i*45);
    });
  }, 200+N*80+550);

  /* Yığılır */
  setTimeout(()=>{
    cards.forEach((c,i)=>{
      setTimeout(()=>{
        c.style.transition='transform .38s cubic-bezier(.34,1.3,.64,1)';
        c.style.transform=`translate(-50%,-50%) rotate(${(i-3)*2.5}deg) scale(1)`;
        c.style.boxShadow=`0 ${4+i*3}px ${12+i*6}px rgba(0,0,0,0.6)`;
      }, i*55);
    });
  }, 200+N*80+900);

  /* Orta kart parlayarak öne çıkar */
  setTimeout(()=>{
    const mid=cards[Math.floor(N/2)];
    mid.style.transition='transform .5s cubic-bezier(.34,1.5,.64,1), filter .5s ease';
    mid.style.transform='translate(-50%,-60%) rotate(0deg) scale(1.22)';
    mid.style.filter=`drop-shadow(0 20px 50px rgba(0,0,0,.9)) drop-shadow(0 0 30px ${cc}88)`;
    mid.style.zIndex='20';
  }, 200+N*80+1350);

  /* "Hazır!" yazısı */
  setTimeout(()=>{
    readyEl.style.transition='opacity .4s ease, transform .4s ease';
    readyEl.style.opacity='1'; readyEl.style.transform='translateY(0)';
  }, 200+N*80+1600);

  /* Kapan + callback */
  setTimeout(()=>{
    overlay.style.transition='opacity .45s ease';
    overlay.style.opacity='0';
    setTimeout(()=>{
      overlay.classList.remove('active');
      overlay.style.cssText='';
      cardsDiv.innerHTML='';
      titleEl.style.cssText='opacity:0;transform:translateY(8px);transition:none;';
      readyEl.style.cssText='opacity:0;';
      onDone();
    },460);
  }, 200+N*80+2100);
}

/* ══════════════════════════════════════════════
   BAŞLAT
══════════════════════════════════════════════ */
document.body.className='t-night';

/* ── LOADER: her şeyden önce çalış, hiçbir şeye bağımlı değil ── */
(function(){
  const ls  = document.getElementById('loading-screen');
  const bar = document.getElementById('load-bar');
  if(!ls) return;
  
  function hide(){ ls.classList.add('fade-out'); setTimeout(()=>{ls.style.display='none';},500); }
  
  /* Bar animasyonu */
  let p=0;
  const iv=setInterval(()=>{ p+=Math.random()*9+5; if(p>=100){p=100;clearInterval(iv);} bar&&(bar.style.width=p+'%'); },55);
  
  /* 1.5s sonra kapat — internet / JS hatası önemli değil */
  setTimeout(hide, 1500);
  /* Mutlak güvenlik: 3s */
  setTimeout(hide, 3000);
})();

/* ── Geri kalan başlatma — hata olsa bile loader etkilenmez ── */
